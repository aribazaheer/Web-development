<!DOCTYPE html>
<html>
<head>
  <title>Student Registration</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Student Registration</h1>

  <form>

    <div class="form-group">
      <label>Student Name:</label>
      <div class="name-row">
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
      </div>
    </div>

    <div class="form-group">
      <label>Email:</label>
      <input type="email" placeholder="example@gmail.com">
    </div>

    <div class="form-group">
      <label>Password:</label>
      <input type="password" placeholder="********">
    </div>

    <div class="form-group">
      <label>City:</label>
      <select>
        <option>Select City</option>
        <option>Islamabad</option>
        <option>Lahore</option>
        <option>Karachi</option>
        <option>Rawalpindi</option>
        <option>Multan</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Gender:</label>
      <input type="radio" name="gender" class="inline"> Male
      <input type="radio" name="gender" class="inline"> Female
      <input type="radio" name="gender" class="inline"> Other
    </div>

    <div class="form-group">
      <label>Hobbies:</label>
      <input type="checkbox" class="inline"> Reading
      <input type="checkbox" class="inline"> Sports
      <input type="checkbox" class="inline"> Music
      <input type="checkbox" class="inline"> Coding
    </div>

    <button type="submit">Submit</button>

  </form>
</div>

</body>
</html>
