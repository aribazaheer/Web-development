<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>
</head>

<body bgcolor="Thistle">

<form>
<table align="center" width="700" cellpadding="10">

<tr>
<td colspan="2" align="center">
<h1>Student Registration</h1>
</td>
</tr>

<tr>
    <td>Student name :</td>
    <td>
        <input type="text" size="21" placeholder="First Name"/>
        <input type="text" size="21" placeholder="Last Name"/>

    </td>
</tr>
<tr>
    <td>E-mail :</td>
    <td>
        <input type="text" size="21" placeholder="@gmail.com"/>

    </td>
</tr>
<tr>
    <td>Password</td>
    <td>
        <input type="text" size="21" placeholder="xxxxxxxxxx"/>

    </td>
</tr>
<tr>
    <td>City</td>
    <td>
        <select>
          <option>
            -----------------City-----------------
          </option>  
          <option>Islamabad</option>
          <option>Lahore</option>
          <option>Karachi</option>
          <option>Gilgit baltistan</option>
          <option>Rawalpindi</option>
          <option>Multan</option>
          <option>Other</option>
        </select>

    </td>
</tr>
<tr>
    <td>Gneder :</td>
    <td>
        <input type="radio" name="g" /> Male
        <input type="radio" name="g" /> Female
        <input type="radio" name="g" /> Other

    </td>
</tr>
<tr>
    <td>Hobbies :</td>
    <td>
        <input type="radio" name="g" /> Reading
        <input type="radio" name="g" /> Sport
        <input type="radio" name="g" /> Music
        <input type="radio" name="g" /> Coding

    </td>
</tr>
<tr>
    <td colspan="2" align = "center">
        <input type="submit" value="Submit">
    </td>
</tr>

</table>
</form>

</body>
</html>
